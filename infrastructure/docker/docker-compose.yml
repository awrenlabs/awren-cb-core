version: "3.8"

services:
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://awren:awren@postgres:5432/awren
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - neo4j
      - qdrant

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: awren
      POSTGRES_PASSWORD: awren
      POSTGRES_DB: awren
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/awren2026
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neodata:/data

  qdrant:
    image: qdrant/qdrant:v1.12
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  neodata:
  qdrantdata:

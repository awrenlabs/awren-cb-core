<div class="chat-message user fade-in">
    <div class="chat-bubble" style="background: var(--accent-blue-bg); border: 1px solid rgba(138,180,248,0.2); border-radius: var(--radius-lg); padding: var(--sp-4); max-width: 720px; margin-left: auto;">
        <div style="display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-2);">
            <span style="width: 24px; height: 24px; background: var(--bg-elevated); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-secondary);">U</span>
            <span style="font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary);">You</span>
        </div>
        <p style="font-size: var(--text-md); color: var(--text-primary); line-height: 1.6;">{{ message }}</p>
    </div>
</div>
<div class="chat-message assistant fade-in">
    <div class="chat-bubble" style="background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--sp-4); max-width: 720px;">
        <div style="display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-2);">
            <span style="width: 24px; height: 24px; background: var(--accent-blue-bg); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--accent-blue);">A</span>
            <span style="font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary);">Awren Core</span>
            <span class="badge" style="font-size: 9px; margin-left: auto;">
                {{ "%.0f"|format(confidence * 100) }}% confidence
            </span>
            <span style="font-size: 9px; color: var(--text-tertiary);">{{ "%.0f"|format(execution_time_ms) }}ms</span>
        </div>
        <p style="font-size: var(--text-md); color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap;">{{ reply }}</p>
        {% if entities %}
        <div style="margin-top: var(--sp-3); padding-top: var(--sp-3); border-top: 1px solid var(--border-subtle);">
            <div style="font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--sp-2);">Referenced Entities</div>
            <div style="display: flex; flex-wrap: wrap; gap: var(--sp-1);">
                {% for e in entities %}
                <a href="/dashboard/entities/{{ e.id }}" class="badge badge-blue" style="cursor: pointer;">◆ {{ e.label }}</a>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>
</div>
<script>
    var el = document.getElementById('chat-messages');
    if (el) { setTimeout(function() { el.scrollTop = el.scrollHeight; }, 50); }
</script>
